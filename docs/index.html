<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#ff435e" />
  <meta name="color-scheme" content="light dark" />
  <title>ヘルスケアビューア</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./icons/favicon.png" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ヘルスケア" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <button id="backBtn" class="icon-btn" aria-label="戻る" hidden>‹</button>
      <h1 id="titleBar">ヘルスケアビューア</h1>
      <button id="filesBtn" class="icon-btn" aria-label="ファイル">≡</button>
    </header>
    <main id="view"></main>
    <nav id="tabBar" class="tab-bar">
      <button class="tab" data-route="files">
        <span class="tab-ic">📁</span><span>ファイル</span>
      </button>
      <button class="tab" data-route="dashboard">
        <span class="tab-ic">🏠</span><span>ダッシュボード</span>
      </button>
      <button class="tab" data-route="workouts">
        <span class="tab-ic">🏃</span><span>ワークアウト</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" hidden></div>
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button id="modalCancel" class="btn">キャンセル</button>
        <button id="modalOk" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- vendor libs -->
  <script src="./vendor/chart/chart.umd.min.js"></script>
  <script src="./vendor/chart/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="./vendor/leaflet/leaflet.js"></script>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
